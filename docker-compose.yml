version: '3.8'

# ------------------------------------------------
# AI Code Review Assistant — Docker Compose
# ------------------------------------------------
# Set environment variables in your shell before running:
#   export AI_API_KEY=sk-xxx
#   export GITHUB_API_TOKEN=ghp-xxx
#   export GITHUB_WEBHOOK_SECRET=xxx
# DB credentials default to postgres/postgres (see application-secrets.yml)
# ------------------------------------------------

networks:
  ai-code-review-network:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-code-review-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_code_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-code-review-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  app:
    build: .
    container_name: ai-code-review-app
    ports:
      - "8080:8080"
    environment:
      # AI provider key — set via shell env var before docker-compose up
      AI_API_KEY: ${AI_API_KEY:-}
      # Use the service name (postgres) as hostname within the Docker network
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_code_review
      # GitHub integration (optional)
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use bash /dev/tcp since curl/wget may not be in the base JRE image
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/127.0.0.1/8080) 2>/dev/null'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ai-code-review-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  pgdata:
    driver: local
