# ============================================================================
# Secrets Configuration — Environment Variable References
# ============================================================================
# All sensitive values are centralized here with the "secrets" prefix.
# Other application files reference these via ${secrets.xxx} placeholders.
#
# Set these environment variables before running:
#   export AI_API_KEY=sk-xxx          (DeepSeek API Key from https://platform.deepseek.com)
#   export AI_BASE_URL=https://api.deepseek.com
#   export DB_USERNAME=postgres
#   export DB_PASSWORD=postgres
#   export AI_API_KEY=sk-xxx          (DeepSeek API Key from https://platform.deepseek.com)
#   export AI_BASE_URL=https://api.deepseek.com
#   export DB_USERNAME=postgres
#   export DB_PASSWORD=postgres
#   export GITHUB_API_TOKEN=ghp-xxx
#   export GITHUB_WEBHOOK_SECRET=xxx
# ============================================================================

secrets:
  ai-api-key: ${AI_API_KEY:sk-be878ce85f6943dfa0353086fdbacf67}
  ai-base-url: ${AI_BASE_URL:https://api.deepseek.com}
  db-username: ${DB_USERNAME:postgres}
  db-password: ${DB_PASSWORD:postgres}
  github-api-token: ${GITHUB_API_TOKEN:}
  github-webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  github-proxy-host: ${GITHUB_PROXY_HOST:}
  github-proxy-port: ${GITHUB_PROXY_PORT:}
